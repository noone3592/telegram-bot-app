<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Squash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; font-family: monospace; color: white; text-align: center; }
        canvas { background: #222; display: block; margin: 0 auto; border-top: 5px solid #fff; border-left: 5px solid #fff; border-right: 5px solid #fff; }
        #ui { padding: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="scoreText">0</span></div>
    <canvas id="gameCanvas" width="300" height="400"></canvas>
    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0, isGameOver = false;
        
        const paddle = { x: 110, y: 380, width: 80, height: 10 };
        const ball = { x: 150, y: 200, radius: 6, dx: 3, dy: -3, speedMod: 1.05 };

        // Besturing (vinger/muis)
        canvas.addEventListener('touchmove', e => {
            let rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            paddle.x = touchX - paddle.width / 2;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        });

        function update() {
            if (isGameOver) return;
            
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Muur links en rechts
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) ball.dx *= -1;
            // Plafond
            if (ball.y - ball.radius < 0) ball.dy *= -1;

            // Paddle geraakt
            if (ball.y + ball.radius > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                ball.dy *= -1;
                ball.y = paddle.y - ball.radius; // Voorkom dat bal in paddle vast komt
                ball.dx *= ball.speedMod; // Maak iets sneller!
                ball.dy *= ball.speedMod;
                score += 10;
                document.getElementById('scoreText').innerText = score;
            }

            // Bodem geraakt (Game Over)
            if (ball.y + ball.radius > canvas.height) return over();

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Paddle
            ctx.fillStyle = '#0f0'; ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            // Ball
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill(); ctx.closePath();
        }

        function over() {
            isGameOver = true;
            try { tg.sendData(JSON.stringify({action: 'save_score', game_name: 'squash', score: score})); } 
            catch(e) { alert("Game Over! Score: " + score); }
        }

        update();
    </script>
</body>
</html>
