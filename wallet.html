<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect Phantom</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #ab9ff2; }
        .phantom-btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; width: 100%; }
        .phantom-btn:hover { background: #9580ff; }
        .phantom-btn img { width: 24px; height: 24px; }
        #status { margin-top: 20px; color: #aaa; font-size: 14px; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Premium Verification</h2>
        <p>Connect your Phantom wallet to verify your token balance.</p>
        
        <button class="phantom-btn" onclick="connectPhantom()">
            <img src="https://phantom.app/img/logo.png" alt="Phantom" onerror="this.style.display='none'">
            Connect Wallet
        </button>

        <p id="status"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const MY_WEBAPP_URL = "https://noone3592.github.io/telegram-bot-app/wallet.html"; 
        const BOT_USERNAME = "Omni_V1_Bot";

        async function connectPhantom() {
            const statusText = document.getElementById('status');
            const provider = window.phantom?.solana;
            
            if (provider?.isPhantom) {
                try {
                    statusText.innerText = "Requesting connection...";
                    const resp = await provider.connect();
                    const walletAddress = resp.publicKey.toString();
                    
                    statusText.style.color = "#0f0";
                    statusText.innerText = "Connected! Returning to Telegram...";
                    
                    // Als we initData hebben, zitten we in de PC Telegram
                    if (tg.initDataUnsafe && Object.keys(tg.initDataUnsafe).length > 0) {
                        tg.sendData(JSON.stringify({ action: 'link_wallet', wallet: walletAddress }));
                    } else {
                        // Anders zitten we in de Phantom App browser! Stuur ons terug naar de bot.
                        window.location.href = `https://t.me/${BOT_USERNAME}?start=wallet_${walletAddress}`;
                    }
                } catch (err) {
                    statusText.style.color = "#f00";
                    statusText.innerText = "Connection rejected.";
                }
            } else {
                // HIER ZIT DE MAGIE: Gebruik tg.openLink om Telegram te forceren de Phantom App te openen
                statusText.innerText = "Opening Phantom App...";
                const encodedUrl = encodeURIComponent(MY_WEBAPP_URL);
                const deepLink = `https://phantom.app/ul/browse/${encodedUrl}?ref=${encodedUrl}`;
                
                try {
                    tg.openLink(deepLink); // Officiële Telegram WebApp routing
                } catch (e) {
                    window.location.href = deepLink; // Fallback
                }
            }
        }
    </script>
</body>
</html>
