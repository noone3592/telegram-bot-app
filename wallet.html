<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Bot - Connect</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; margin: 0; }
        .container { max-width: 90%; margin: 0 auto; background: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ab9ff2; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn:active { background: #9580ff; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <h2>Loading...</h2>
    </div>

    <script>
        const MY_URL = "https://noone3592.github.io/telegram-bot-app/wallet.html?v=10";
        const BOT_URL = "https://t.me/Omni_V1_Bot";
        
        // Initialiseer de Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Checken of we in de Telegram WebApp zitten (initDataUnsafe is dan gevuld)
        if (tg.initDataUnsafe && Object.keys(tg.initDataUnsafe).length > 0) {
            
            // WE ZITTEN IN TELEGRAM: Gebruik jouw oplossing om Chrome/Safari te openen
            document.getElementById("content").innerHTML = `
                <h2>Secure Connection</h2>
                <p>We need to open your browser to securely connect to Phantom.</p>
                <button class="btn" onclick="openExternalBrowser()">🌍 Open in Browser</button>
            `;
            
        } else {
            
            // WE ZITTEN IN CHROME/SAFARI: Toon de echte Phantom knop!
            document.getElementById("content").innerHTML = `
                <h2>Premium Verification</h2>
                <p>Click below to connect your wallet safely.</p>
                <button class="btn" onclick="connectWallet()">🔗 Connect Phantom</button>
                <p id="status"></p>
            `;
            
        }

        function openExternalBrowser() {
            // Jouw oplossing, plus de officiele {try_browser: true} flag om het af te dwingen!
            Telegram.WebApp.openLink(MY_URL, { try_browser: true });
        }

        async function connectWallet() {
            const status = document.getElementById('status');
            status.innerText = "Requesting approval...";
            
            const provider = window.phantom ? window.phantom.solana : null;
            
            if (provider && provider.isPhantom) {
                try {
                    const resp = await provider.connect();
                    const wallet = resp.publicKey.toString();
                    
                    status.style.color = "#00ff00";
                    status.innerText = "✅ Success! Redirecting back...";
                    
                    setTimeout(() => {
                        window.location.href = BOT_URL + "?start=wallet_" + wallet;
                    }, 1500);
                } catch (err) {
                    status.style.color = "#ff0000";
                    status.innerText = "❌ Error: " + err.message;
                }
            } else {
                status.innerText = "Opening Phantom app...";
                const encodedUrl = encodeURIComponent(window.location.href);
                window.location.href = "https://phantom.app/ul/browse/" + encodedUrl + "?ref=" + encodedUrl;
            }
        }
    </script>
</body>
</html>
