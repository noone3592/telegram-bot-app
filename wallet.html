<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Omni Bot - Connect</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 60px; margin: 0; }
        .container { max-width: 90%; margin: 0 auto; background: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { color: #ab9ff2; margin-top: 0; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        .btn:active { transform: scale(0.96); background: #9580ff; }
        p#instruction { color: #ccc; font-size: 15px; line-height: 1.5; }
        #log { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Premium Verification</h2>
        <p id="instruction">Checking your browser...</p>
        
        <button id="mainBtn" class="btn" style="display:none;"></button>
        
        <p id="log"></p>
    </div>

    <script>
        const BOT_URL = "https://t.me/Omni_V1_Bot";
        const MY_URL = "https://noone3592.github.io/telegram-bot-app/wallet.html";

        const btn = document.getElementById("mainBtn");
        const instruction = document.getElementById("instruction");
        const log = document.getElementById("log");

        // Check if the Phantom in-app Solana provider is present
        function isPhantom() {
            return window.phantom && window.phantom.solana && window.phantom.solana.isPhantom;
        }

        window.onload = () => {
            if (isPhantom()) {
                // SCENARIO 1: User is inside the Phantom App
                instruction.innerHTML = "✅ Phantom app successfully loaded!<br><br>Click the button below to sign the connection request.";
                btn.innerText = "✍️ Approve Connection";
                btn.style.display = "block";
                btn.onclick = doConnectAndSign;
            } else {
                // SCENARIO 2: User is in Telegram or Chrome/Safari
                instruction.innerHTML = "To securely link your wallet, we need to open this page inside the Phantom App.<br><br>Click below to launch Phantom.";
                btn.innerText = "🚀 Open Phantom App";
                btn.style.display = "block";
                btn.onclick = openPhantomDeepLink;
            }
        };

        function openPhantomDeepLink() {
            log.style.color = "#ffaa00";
            log.innerText = "Redirecting to Phantom...";
            const encodedUrl = encodeURIComponent(MY_URL);
            window.location.href = `https://phantom.app/ul/browse/${encodedUrl}?ref=${encodedUrl}`;
        }

        async function doConnectAndSign() {
            try {
                log.style.color = "#ffaa00";
                log.innerText = "Waiting for your approval...";
                
                const provider = window.phantom.solana;

                // This forces the "Connect" popup in Phantom
                const resp = await provider.connect();
                const wallet = resp.publicKey.toString();

                log.style.color = "#00ff00";
                log.innerText = "✅ Success! Redirecting back to Telegram...";

                // Wait 1.5 seconds so the user sees the success message, then redirect
                setTimeout(() => {
                    window.location.href = `${BOT_URL}?start=wallet_${wallet}`;
                }, 1500);

            } catch (err) {
                log.style.color = "#ff0000";
                log.innerText = "❌ Cancelled or error: " + err.message;
            }
        }
    </script>
</body>
</html>
