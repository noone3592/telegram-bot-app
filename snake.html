<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; text-align: center; overflow: hidden; }
        canvas { background: #111; display: block; margin: 0 auto; border: 2px solid #333; }
        #ui { padding: 10px; font-size: 20px; }
        .controls { margin-top: 15px; display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 5px; }
        .btn { background: #333; color: #0f0; border: 1px solid #0f0; border-radius: 5px; height: 50px; font-size: 24px; user-select: none; }
        .btn:active { background: #0f0; color: #000; }
        #gameOver { display: none; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #0f0; border-radius: 10px; width: 80%; }
        button.retry { background: #0f0; color: #000; padding: 10px; font-size: 16px; margin-top: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="scoreText">0</span></div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    
    <div class="controls">
        <div></div><button class="btn" onclick="changeDir(0, -1)">⬆️</button><div></div>
        <button class="btn" onclick="changeDir(-1, 0)">⬅️</button>
        <button class="btn" onclick="changeDir(0, 1)">⬇️</button>
        <button class="btn" onclick="changeDir(1, 0)">➡️</button>
    </div>

    <div id="gameOver">
        <h2>GAME OVER</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <p id="sending">Verzenden naar Telegram...</p>
        <button class="retry" onclick="location.reload()">Opnieuw</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 15;
        let snake = [{x: 150, y: 150}];
        let apple = {x: 75, y: 75};
        let dx = 0, dy = -gridSize;
        let score = 0;
        let gameLoop;

        function changeDir(x, y) {
            if (dx === 0 && x !== 0) { dx = x * gridSize; dy = 0; }
            if (dy === 0 && y !== 0) { dy = y * gridSize; dx = 0; }
        }

        // Toetsenbord support voor PC
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') changeDir(0, -1);
            if(e.key === 'ArrowDown') changeDir(0, 1);
            if(e.key === 'ArrowLeft') changeDir(-1, 0);
            if(e.key === 'ArrowRight') changeDir(1, 0);
        });

        function resetApple() {
            apple.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            apple.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Dood door muur
            if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) return over();
            
            // Dood door eigen staart
            for(let i=0; i<snake.length; i++) {
                if(head.x === snake[i].x && head.y === snake[i].y) return over();
            }

            snake.unshift(head); // Voeg nieuw hoofd toe

            // Appel gegeten?
            if(head.x === apple.x && head.y === apple.y) {
                score += 10;
                document.getElementById('scoreText').innerText = score;
                resetApple();
            } else {
                snake.pop(); // Verwijder staart (want niet gegeten)
            }

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red'; ctx.fillRect(apple.x, apple.y, gridSize-1, gridSize-1);
            ctx.fillStyle = 'lime'; snake.forEach(part => ctx.fillRect(part.x, part.y, gridSize-1, gridSize-1));
        }

        function over() {
            clearInterval(gameLoop);
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
            try {
                tg.sendData(JSON.stringify({action: 'save_score', game_name: 'snake', score: score}));
            } catch(e) { document.getElementById('sending').innerText = 'Niet in Telegram'; }
        }

        gameLoop = setInterval(update, 120); // Snelheid van de slang
    </script>
</body>
</html>
