<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Phantom</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding-top: 80px; margin: 0; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 15px; border-radius: 12px; width: 80%; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Stap 2: Premium Verification</h2>
    <p>Je zit nu veilig in je browser.</p>
    
    <button class="btn" onclick="connectWallet()">🔗 Connect Phantom</button>
    <p id="status"></p>

    <script>
        const BOT_URL = "https://t.me/Omni_V1_Bot";

        async function connectWallet() {
            const status = document.getElementById('status');
            status.innerText = "Waiting for validation...";
            
            const provider = window.phantom ? window.phantom.solana : null;
            
            if (provider && provider.isPhantom) {
                try {
                    const resp = await provider.connect();
                    const wallet = resp.publicKey.toString();
                    
                    status.style.color = "#00ff00";
                    status.innerText = "✅ Success! Back to telegram...";
                    
                    setTimeout(() => {
                        window.location.href = BOT_URL + "?start=wallet_" + wallet;
                    }, 1500);
                } catch (err) {
                    status.style.color = "#ff0000";
                    status.innerText = "❌ Error: " + err.message;
                }
            } else {
                status.innerText = "Open Phantom app...";
                const encodedUrl = encodeURIComponent(window.location.href);
                window.location.href = "https://phantom.app/ul/browse/" + encodedUrl + "?ref=" + encodedUrl;
            }
        }
    </script>
</body>
</html>
