<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni Bot - Connect</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; margin: 0; }
        .container { max-width: 90%; margin: 0 auto; background: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { color: #ab9ff2; margin-top: 0; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 15px; }
        .btn:active { background: #9580ff; }
        p { color: #ccc; font-size: 15px; line-height: 1.5; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <h2>Premium Verification</h2>
        <p>Click the button below to securely connect your Phantom wallet.</p>
        <button class="btn" onclick="startConnection()">🔮 Connect Phantom</button>
        <p id="status"></p>
    </div>

    <script>
        // Jouw GitHub Pages URL en je Bot URL
        const MY_URL = "https://noone3592.github.io/telegram-bot-app/wallet.html";
        const BOT_URL = "https://t.me/Omni_V1_Bot";
        
        // De Recap-truc: We gebruiken de URL parameters om te checken of we uit Phantom komen
        const urlParams = new URLSearchParams(window.location.search);
        const autoConnect = urlParams.get('autoConnect');

        window.onload = () => {
            // Als we in de Phantom app zitten (na de overstap), triggeren we direct de connectie!
            if (autoConnect === 'true' && window.phantom && window.phantom.solana) {
                document.getElementById('content').innerHTML = `
                    <h2>Phantom Linked</h2>
                    <p>Approve the connection request in Phantom.</p>
                    <p id="status" style="color:#ffaa00;">Waiting for approval...</p>
                `;
                finalizeConnection();
            }
        };

        function startConnection() {
            const status = document.getElementById('status');
            const provider = window.phantom ? window.phantom.solana : null;
            
            // 1. Zitten we toevallig al in Phantom of op PC? Dan direct verbinden.
            if (provider && provider.isPhantom) {
                finalizeConnection();
            } 
            // 2. We zitten in de Telegram In-App Browser! 
            else {
                status.innerText = "Opening Phantom App...";
                
                // We sturen de gebruiker naar Phantom via de officiële Deep Link.
                // We plakken '?autoConnect=true' achter de URL, zodat het script straks weet dat hij in Phantom de pop-up moet tonen!
                const targetUrl = MY_URL + "?autoConnect=true";
                const encodedUrl = encodeURIComponent(targetUrl);
                
                // Dit is de exacte link die Recap aanroept om de Phantom app te openen
                window.location.href = "https://phantom.app/ul/browse/" + encodedUrl + "?ref=" + encodedUrl;
            }
        }

        async function finalizeConnection() {
            const status = document.getElementById('status');
            try {
                // Forceer de "Connect" pop-up in Phantom
                const resp = await window.phantom.solana.connect();
                const wallet = resp.publicKey.toString();
                
                status.style.color = "#00ff00";
                status.innerText = "✅ Success! Redirecting back to Telegram...";
                
                // Schiet de gebruiker (met z'n wallet adres) terug naar de Telegram Bot
                setTimeout(() => {
                    window.location.href = BOT_URL + "?start=wallet_" + wallet;
                }, 1500);
            } catch (err) {
                status.style.color = "#ff0000";
                status.innerText = "❌ Cancelled or error: " + err.message;
            }
        }
    </script>
</body>
</html>
