<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Omni Bot - Multichain Auth</title>

    <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.min.js"></script>
    <script>
        window.global = window;
        window.process = { env: { NODE_ENV: "production" } };
        try { window.Buffer = window.Buffer || window.buffer.Buffer; } catch(e) {}
    </script>
    <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.14.0/dist/index.umd.js"></script>

    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; margin: 0; }
        .container { max-width: 90%; margin: 0 auto; background: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { color: #ab9ff2; margin-top: 0; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 15px; display: none; }
        
        /* Specifieke Wallet Kleuren */
        .btn-mm { background: #f6851b; color: #fff; } /* MetaMask */
        .btn-tw { background: #3375bb; color: #fff; } /* Trust Wallet */
        .btn-ph { background: #ab9ff2; color: #000; } /* Phantom */
        .btn-uni { background: #ff007a; color: #fff; } /* Uniswap / WC */
        .btn-success { background: #00ff00; color: #000; text-decoration: none; display: block; margin-top:20px; }
        
        .btn:active { transform: scale(0.96); }
        p { color: #ccc; font-size: 15px; line-height: 1.5; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; color: #aaa; }
        #error-log { margin-top: 20px; font-family: monospace; font-size: 12px; color: #ff5555; text-align: left; background: #2a0000; padding: 10px; border-radius: 8px; display: none; overflow-wrap: break-word;}
    </style>

    <script>
        const isTelegramWebView = (window.TelegramWebview || navigator.userAgent.includes("Telegram"));
        const isAndroid = /android/i.test(navigator.userAgent);
        
        if (isTelegramWebView && isAndroid) {
            const url = window.location.href;
            window.location.replace(`intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;end`);
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Governance Auth</h2>
        <p id="instruction">Checking environment...</p>
        
        <button id="native-btn" class="btn">🔗 Connect & Verify</button>
        <button id="mm-btn" class="btn btn-mm">🦊 MetaMask</button>
        <button id="tw-btn" class="btn btn-tw">🛡️ Trust Wallet</button>
        <button id="ph-btn" class="btn btn-ph">👻 Phantom</button>
        <button id="wc-btn" class="btn btn-uni">🦄 Uniswap & Other Wallets</button>
        
        <p id="status"></p>
        <div id="error-log"></div>
    </div>

    <script>
        // JOUW BOT GEGEVENS
        const BOT_USERNAME = "Omni_V1_Bot";
        const projectId = 'f5f53aec4c83975405848c390e58eb60';

        const statusTxt = document.getElementById('status');
        const instructionTxt = document.getElementById('instruction');
        const errorLog = document.getElementById('error-log');

        function showError(msg) {
            errorLog.style.display = 'block';
            errorLog.innerHTML += `❌ ${msg}<br>`;
            statusTxt.innerText = "Action failed.";
        }
        
        window.onerror = function(msg, url, line) {
            showError(`System Error: ${msg} (Line ${line})`);
            return true;
        };

        function stringToHex(str) {
            let hex = '';
            for(let i=0; i<str.length; i++) {
                hex += '' + str.charCodeAt(i).toString(16);
            }
            return '0x' + hex;
        }

        // --- DE MAGISCHE REDIRECT TERUG NAAR TELEGRAM ---
        function proceedWithAddress(address) {
            // 1. Verberg alle wallet knoppen
            document.querySelectorAll('.btn').forEach(b => b.style.display = 'none');
            
            // 2. Bouw de native Telegram app link (tg://) en de web link (https://)
            const tgLink = `tg://resolve?domain=${BOT_USERNAME}&start=wallet_${address}`;
            const webLink = `https://t.me/${BOT_USERNAME}?start=wallet_${address}`;

            // 3. Forceer direct de besturingssysteem pop-up!
            window.location.href = tgLink;

            // 4. Als de in-app browser het blokkeert, toon na 1 seconde een grote "Terug" knop!
            setTimeout(() => {
                statusTxt.innerHTML = `
                    <span style="color:#00ff00; font-size:18px;">✅ Verified Successfully!</span><br><br>
                    If Telegram didn't open automatically, click the button below:<br>
                    <a href="${tgLink}" class="btn btn-success">⬅️ Return to Telegram</a><br>
                    <a href="${webLink}" style="color:#ab9ff2; font-size:12px; margin-top:15px; display:inline-block;">Click here if the button fails</a>
                `;
            }, 1000);
        }

        window.onload = () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // SCENARIO 1: We zitten BINNEN in een Wallet App (MetaMask, Trust, of Phantom)
            // Phantom injecteert 'window.phantom', MetaMask/Trust injecteert 'window.ethereum'
            if (window.ethereum || window.phantom) {
                instructionTxt.innerHTML = "Secure connection available. Click below to verify your wallet.";
                const nativeBtn = document.getElementById('native-btn');
                nativeBtn.style.display = 'block';
                nativeBtn.onclick = connectNativeWallet;
                return; 
            }

            // SCENARIO 2: We zitten op een Mobiele Browser (Chrome/Safari)
            if (isMobile) {
                instructionTxt.innerHTML = "Select your wallet app to securely verify your identity.";
                
                const mmBtn = document.getElementById('mm-btn');
                const twBtn = document.getElementById('tw-btn');
                const phBtn = document.getElementById('ph-btn');
                const wcBtn = document.getElementById('wc-btn');
                
                mmBtn.style.display = 'block';
                twBtn.style.display = 'block';
                phBtn.style.display = 'block';
                wcBtn.style.display = 'block'; // WalletConnect is ook beschikbaar voor Uniswap/overige

                const cleanUrl = window.location.href.replace(/^https?:\/\//, '');
                const encodedUrl = encodeURIComponent(window.location.href);

                // Deep Links per wallet
                mmBtn.onclick = () => window.location.href = `https://metamask.app.link/dapp/${cleanUrl}`;
                twBtn.onclick = () => window.location.href = `https://link.trustwallet.com/open_url?coin_id=60&url=${encodedUrl}`;
                phBtn.onclick = () => window.location.href = `https://phantom.app/ul/browse/${encodedUrl}?ref=${encodedUrl}`;
                wcBtn.onclick = connectWalletConnectFallback;
            } 
            // SCENARIO 3: We zitten op een PC/Laptop
            else {
                instructionTxt.innerHTML = "Select an option to scan a QR code with your mobile app.";
                const wcBtn = document.getElementById('wc-btn');
                wcBtn.style.display = 'block';
                wcBtn.innerText = "🌍 Connect Wallet";
                wcBtn.onclick = connectWalletConnectFallback;
            }
        };

        // --- DE IN-APP VERIFICATIE ---
        async function connectNativeWallet() {
            try {
                statusTxt.innerText = "Connecting...";
                
                // Zoek de juiste Web3 provider (Ondersteuning voor Phantom EVM en MetaMask/Trust)
                let provider = window.ethereum;
                if (window.phantom && window.phantom.ethereum) {
                    provider = window.phantom.ethereum;
                }

                if (!provider) throw new Error("No Web3 provider found in this app.");

                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                if (!accounts || accounts.length === 0) throw new Error("No accounts found.");
                
                const address = accounts[0];
                
                statusTxt.innerText = "Please SIGN the message to verify...";
                const messageHex = stringToHex("Verify wallet for Omni Bot Governance");
                
                await provider.request({
                    method: 'personal_sign',
                    params: [messageHex, address],
                });

                proceedWithAddress(address);
            } catch (err) {
                showError("Verification rejected or failed.");
            }
        }

        // --- DE WALLETCONNECT FUNCTIE (Voor Uniswap & PC) ---
        async function connectWalletConnectFallback() {
            try {
                statusTxt.innerText = "Loading WalletConnect...";
                
                let ProviderClass = window.EthereumProvider || (window.WalletConnectEthereumProvider && window.WalletConnectEthereumProvider.EthereumProvider);
                if (!ProviderClass) throw new Error("WalletConnect module not loaded.");

                const provider = await ProviderClass.init({
                    projectId: projectId,
                    chains: [1], 
                    showQrModal: true,
                    qrModalOptions: { themeMode: "dark" }
                });

                statusTxt.innerText = "Opening popup...";
                await provider.enable();
                
                if (!provider.accounts || provider.accounts.length === 0) throw new Error("No accounts found.");

                const address = provider.accounts[0];
                const messageHex = stringToHex("Verify wallet for Omni Bot Governance");

                await provider.request({
                    method: "personal_sign",
                    params: [messageHex, address]
                });

                proceedWithAddress(address);
            } catch (err) {
                showError("WalletConnect: " + err.message);
            }
        }
    </script>
</body>
</html>
