<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omnibo Pro Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; }
        h2 { margin-top: 0; font-size: 20px; }
        
        /* Tabbladen CSS */
        .tabs { display: flex; border-bottom: 2px solid var(--secondary-bg-color); margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: var(--hint-color); font-weight: bold; }
        .tab.active { color: var(--button-color); border-bottom: 2px solid var(--button-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background-color: var(--secondary-bg-color); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        input[type="text"], textarea { 
            width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 10px; 
            border: 1px solid var(--hint-color); border-radius: 6px; 
            background-color: var(--bg-color); color: var(--text-color); box-sizing: border-box; 
        }
        textarea { resize: vertical; height: 80px; }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--button-color); }
        input:checked + .slider:before { transform: translateX(16px); }

        .main-btn { background-color: var(--button-color); color: var(--button-text-color); border: none; border-radius: 8px; padding: 14px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>⚙️ Bot Dashboard</h2>

    <div class="tabs">
        <div class="tab active" onclick="showTab('tab-general')">Algemeen</div>
        <div class="tab" onclick="showTab('tab-content')">Teksten & Media</div>
        <div class="tab" onclick="showTab('tab-tools')">Tools</div>
    </div>

    <div id="tab-general" class="tab-content active">
        <div class="card">
            <div class="setting-row">
                <span>🛡️ Nieuwe leden Captcha</span>
                <label class="switch"><input type="checkbox" id="toggleCaptcha"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <span>👋 Welkomstbericht sturen</span>
                <label class="switch"><input type="checkbox" id="toggleWelcome" checked><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <div id="tab-content" class="tab-content">
        <div class="card">
            <label for="welcomeText"><b>💬 Custom Welkomstbericht:</b> (gebruik {user} voor de naam)</label>
            <textarea id="welcomeText" placeholder="Welkom in de groep, {user}!"></textarea>

            <label for="welcomeGif"><b>🖼️ Welkomst GIF/Video (URL link):</b></label>
            <input type="text" id="welcomeGif" placeholder="https://tenor.com/view/...">
            
            <label for="rulesText"><b>📜 Groepsregels:</b></label>
            <textarea id="rulesText" placeholder="1. Geen spam&#10;2. Geen FUD..."></textarea>
        </div>
    </div>

    <div id="tab-tools" class="tab-content">
        <div class="card">
            <label for="raidTarget"><b>⚔️ Huidige Raid Target (X link):</b></label>
            <input type="text" id="raidTarget" placeholder="https://x.com/...">
        </div>
        <div class="card">
            <div class="setting-row">
                <span>🎁 Forceer Giveaway Start</span>
                <label class="switch"><input type="checkbox" id="toggleGiveaway"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <button class="main-btn" onclick="saveSettings()">💾 Opslaan & Doorsturen</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Simpele functie om tussen tabs te wisselen
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Opslaan functie
        function saveSettings() {
            const settingsData = {
                action: "SAVE_SETTINGS",
                captcha_active: document.getElementById('toggleCaptcha').checked,
                welcome_active: document.getElementById('toggleWelcome').checked,
                welcome_text: document.getElementById('welcomeText').value, // NIEUW
                welcome_gif: document.getElementById('welcomeGif').value,   // NIEUW
                rules_text: document.getElementById('rulesText').value,     // NIEUW
                raid_target: document.getElementById('raidTarget').value,
                trigger_giveaway: document.getElementById('toggleGiveaway').checked
            };

            tg.sendData(JSON.stringify(settingsData));
            tg.close();
        }
    </script>
</body>
</html>
