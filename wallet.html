<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Connect Phantom</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        h2 { color: #ab9ff2; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 15px; border-radius: 8px; width: 100%; margin-top: 20px; cursor: pointer; }
        .btn:active { background: #9580ff; }
        #status { margin-top: 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Premium Verification</h2>
    <p>Klik op de knop hieronder om je wallet te koppelen aan Omni Bot.</p>
    
    <button class="btn" onclick="connectWallet()">🔗 Connect Phantom</button>
    
    <p id="status"></p>

    <script>
        const BOT_URL = "https://t.me/Omni_V1_Bot";
        const MY_URL = "https://noone3592.github.io/telegram-bot-app/wallet.html";

        async function connectWallet() {
            const status = document.getElementById('status');
            
            // 1. Zitten we IN de Phantom App? (Of hebben we de PC extensie?)
            const provider = window.phantom ? window.phantom.solana : null;
            
            if (provider && provider.isPhantom) {
                status.innerText = "Phantom gevonden! Bevestig de pop-up...";
                try {
                    const resp = await provider.connect();
                    const wallet = resp.publicKey.toString();
                    
                    status.style.color = "#0f0";
                    status.innerText = "Gelukt! Je wordt teruggestuurd naar Telegram...";
                    
                    setTimeout(() => {
                        window.location.href = `${BOT_URL}?start=wallet_${wallet}`;
                    }, 1000);
                } catch (err) {
                    status.style.color = "#f00";
                    status.innerText = "Fout: " + err.message;
                }
            } 
            // 2. We zitten in Telegram/Safari/Chrome -> Forceer de Phantom App te openen!
            else {
                status.innerText = "Phantom App openen...";
                const encodedUrl = encodeURIComponent(MY_URL);
                window.location.href = `https://phantom.app/ul/browse/${encodedUrl}?ref=${encodedUrl}`;
            }
        }
    </script>
</body>
</html>
