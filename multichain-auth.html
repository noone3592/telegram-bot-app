<script type="module">
        // MAGISCHE FIX: We gebruiken versie 3.1.0 mét '?bundle' zodat alle CSS correct inlaadt!
        import { createWeb3Modal, defaultConfig } from 'https://esm.sh/@web3modal/ethers5@3.1.0?bundle';

        const BOT_URL = "https://t.me/Omni_V1_Bot";
        
        // ❗ VUL HIER JOUW WALLETCONNECT PROJECT ID IN ❗
        const projectId = 'YOUR_PROJECT_ID_HERE'; 

        const mainnet = {
            chainId: 1,
            name: 'Ethereum',
            currency: 'ETH',
            explorerUrl: 'https://etherscan.io',
            rpcUrl: 'https://cloudflare-eth.com'
        };

        const metadata = {
            name: 'Omni Bot Governance',
            description: 'Verify your wallet for Omni Bot Governance',
            url: window.location.origin,
            icons: ['https://avatars.githubusercontent.com/u/37784886']
        };

        const statusTxt = document.getElementById('status');
        const instructionTxt = document.getElementById('instruction');
        const btnContainer = document.getElementById('btn-container');

        const isTelegram = (window.TelegramWebview || navigator.userAgent.includes("Telegram"));
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (isTelegram && isIOS) {
            instructionTxt.innerHTML = "⚠️ <b>Telegram blocks secure connections.</b><br><br>Please tap the compass icon (🧭) or the three dots in the corner to open this page in <b>Safari</b>.";
        } else {
            try {
                const modal = createWeb3Modal({
                    ethersConfig: defaultConfig({ metadata }),
                    chains: [mainnet],
                    projectId,
                    enableAnalytics: false,
                    themeMode: 'dark' // Zorgt voor een strakke, donkere layout die altijd werkt
                });

                instructionTxt.innerHTML = "Click the button below to connect your multichain wallet.";
                
                const connectBtn = document.createElement('button');
                connectBtn.className = 'btn';
                connectBtn.innerText = '🌍 Connect Wallet';
                connectBtn.onclick = () => modal.open();
                btnContainer.appendChild(connectBtn);

                modal.subscribeProvider(state => {
                    if (state.address) {
                        statusTxt.style.color = "#00ff00";
                        statusTxt.innerText = "✅ Wallet Verified! Redirecting to Telegram...";
                        connectBtn.style.display = 'none';
                        
                        setTimeout(() => {
                            window.location.href = BOT_URL + "?start=wallet_" + state.address;
                        }, 1500);
                    }
                });
            } catch (error) {
                statusTxt.style.color = "#ff0000";
                statusTxt.innerText = "❌ Initialization error. Please check your Project ID.";
                console.error("Web3Modal Error:", error);
            }
        }
    </script>
