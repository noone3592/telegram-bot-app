<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Omni Bot - Connect</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 60px; margin: 0; }
        .container { max-width: 90%; margin: 0 auto; background: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { color: #ab9ff2; margin-top: 0; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        .btn:active { transform: scale(0.96); background: #9580ff; }
        p#instruction { color: #ccc; font-size: 15px; line-height: 1.5; }
        #log { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Premium Verificatie</h2>
        <p id="instruction">We checken je browser...</p>
        
        <button id="mainBtn" class="btn" style="display:none;"></button>
        
        <p id="log"></p>
    </div>

    <script>
        const BOT_URL = "https://t.me/Omni_V1_Bot";
        const MY_URL = "https://noone3592.github.io/telegram-bot-app/wallet.html";

        const btn = document.getElementById("mainBtn");
        const instruction = document.getElementById("instruction");
        const log = document.getElementById("log");

        // Check of de in-app Solana provider van Phantom aanwezig is
        function isPhantom() {
            return window.phantom && window.phantom.solana && window.phantom.solana.isPhantom;
        }

        window.onload = () => {
            if (isPhantom()) {
                // SCENARIO 1: Gebruiker zit IN de Phantom App
                instruction.innerHTML = "✅ Phantom app succesvol geladen!<br><br>Klik op de knop hieronder om de goedkeuring ('Connect') aan te roepen.";
                btn.innerText = "✍️ Geef Goedkeuring";
                btn.style.display = "block";
                btn.onclick = doConnectAndSign;
            } else {
                // SCENARIO 2: Gebruiker zit in Telegram of Safari/Chrome
                instruction.innerHTML = "Om je wallet veilig te koppelen, moeten we deze pagina openen in de Phantom App.<br><br>Klik hieronder om Phantom te starten.";
                btn.innerText = "🚀 Open Phantom App";
                btn.style.display = "block";
                btn.onclick = openPhantomDeepLink;
            }
        };

        function openPhantomDeepLink() {
            log.style.color = "#ffaa00";
            log.innerText = "Doorsturen naar Phantom...";
            const encodedUrl = encodeURIComponent(MY_URL);
            window.location.href = `https://phantom.app/ul/browse/${encodedUrl}?ref=${encodedUrl}`;
        }

        async function doConnectAndSign() {
            try {
                log.style.color = "#ffaa00";
                log.innerText = "Wachten op jouw goedkeuring...";
                
                const provider = window.phantom.solana;

                // Dit is het commando dat de "Connect" popup in Phantom forceert
                const resp = await provider.connect();
                const wallet = resp.publicKey.toString();

                log.style.color = "#00ff00";
                log.innerText = "✅ Verbonden! Je wordt nu teruggestuurd naar Telegram...";

                // Wacht 1,5 seconde zodat de gebruiker ziet dat het gelukt is, schiet dan terug naar de bot
                setTimeout(() => {
                    window.location.href = `${BOT_URL}?start=wallet_${wallet}`;
                }, 1500);

            } catch (err) {
                log.style.color = "#ff0000";
                log.innerText = "❌ Geannuleerd of fout: " + err.message;
            }
        }
    </script>
</body>
</html>
