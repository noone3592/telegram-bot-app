<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Omni Bot - Governance Auth</title>

    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>

    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; margin: 0; }
        .container { max-width: 90%; margin: 0 auto; background: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { color: #ab9ff2; margin-top: 0; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 15px; display: none; text-decoration: none; box-sizing: border-box; }
        
        /* App specifieke kleuren */
        .btn-mm { background: #f6851b; color: #fff; display: block; }
        .btn-tw { background: #3375bb; color: #fff; display: block; }
        .btn-ph { background: #ab9ff2; color: #000; display: block; }
        .btn-success { background: #00ff00; color: #000; display: inline-block; }
        
        .btn:active { transform: scale(0.96); }
        p { color: #ccc; font-size: 15px; line-height: 1.5; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; color: #aaa; }
    </style>

    <script>
        const isTelegramWebView = (window.TelegramWebview || navigator.userAgent.includes("Telegram"));
        const isAndroid = /android/i.test(navigator.userAgent);
        
        if (isTelegramWebView && isAndroid) {
            const url = window.location.href;
            window.location.replace(`intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;end`);
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Governance Auth</h2>
        
        <div id="buttons-container">
            <p id="instruction">Select your wallet to authenticate.</p>
            <button id="native-btn" class="btn">🔗 Connect & Sign</button>
            <button id="mm-btn" class="btn btn-mm">🦊 MetaMask</button>
            <button id="tw-btn" class="btn btn-tw">🛡️ Trust Wallet</button>
            <button id="ph-btn" class="btn btn-ph">👻 Phantom</button>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        const BOT_USERNAME = "Omni_V1_Bot";
        const MY_URL = window.location.origin + window.location.pathname; // Dynamische URL voor Phantom redirect
        
        const statusTxt = document.getElementById('status');
        const instructionTxt = document.getElementById('instruction');
        const buttonsContainer = document.getElementById('buttons-container');

        // --- BASE58 VOOR PHANTOM ---
        const ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
        function encodeBase58(buffer) {
            let carry, digits = [0], i, j;
            for (i = 0; i < buffer.length; ++i) {
                for (j = 0, carry = buffer[i]; j < digits.length; ++j) {
                    carry += digits[j] << 8; digits[j] = carry % 58; carry = (carry / 58) | 0;
                }
                while (carry > 0) { digits.push(carry % 58); carry = (carry / 58) | 0; }
            }
            let res = '';
            for (i = 0; buffer[i] === 0 && i < buffer.length - 1; ++i) res += ALPHABET[0];
            for (i = digits.length - 1; i >= 0; --i) res += ALPHABET[digits[i]];
            return res;
        }
        function decodeBase58(string) {
            let carry, bytes = [0], i, j;
            for (i = 0; i < string.length; ++i) {
                const char = string[i]; const val = ALPHABET.indexOf(char);
                if (val < 0) throw new Error('Non-base58 character');
                for (j = 0, carry = val; j < bytes.length; ++j) {
                    carry += bytes[j] * 58; bytes[j] = carry & 0xff; carry >>= 8;
                }
                while (carry > 0) { bytes.push(carry & 0xff); carry >>= 8; }
            }
            for (i = 0; string[i] === '1' && i < string.length - 1; ++i) bytes.push(0);
            return new Uint8Array(bytes.reverse());
        }

        function stringToHex(str) {
            let hex = '';
            for(let i=0; i<str.length; i++) {
                hex += '' + str.charCodeAt(i).toString(16);
            }
            return '0x' + hex;
        }

        // --- DE "HOTEL CALIFORNIA" OPLOSSING ---
        // Genereert een ECHTE HTML-knop die de in-app browser dwingt Telegram te openen
        function showReturnButton(address) {
            buttonsContainer.style.display = 'none';
            
            // De standaard t.me link. Als de gebruiker hier op tikt, breekt hij uit!
            const tgWebLink = `https://t.me/${BOT_USERNAME}?start=wallet_${address}`;

            statusTxt.innerHTML = `
                <span style="color:#00ff00; font-size:22px;">✅ Verified Successfully!</span><br><br>
                <p>You can now return to the bot to cast your vote.</p>
                <a href="${tgWebLink}" class="btn btn-success" style="display:block; padding:20px;">⬅️ Return to Telegram</a>
            `;
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);

            // SCENARIO 1: We komen TERUG uit Phantom met versleutelde data!
            if (urlParams.has('phantom_encryption_public_key')) {
                buttonsContainer.style.display = 'none';
                statusTxt.innerText = "Decrypting Phantom data...";
                try {
                    const skString = urlParams.get('sk');
                    if (!skString) throw new Error("No safety key found.");
                    
                    const secretKey = decodeBase58(skString);
                    const phantomPublicKey = decodeBase58(urlParams.get('phantom_encryption_public_key'));
                    const nonce = decodeBase58(urlParams.get('nonce'));
                    const data = decodeBase58(urlParams.get('data'));

                    const decrypted = nacl.box.open(data, nonce, phantomPublicKey, secretKey);
                    if (!decrypted) throw new Error("Decryption failed!");

                    const decText = new TextDecoder().decode(decrypted);
                    const parsedData = JSON.parse(decText);
                    const walletAddress = parsedData.public_key;

                    // Laat direct de Return knop zien!
                    showReturnButton(walletAddress);
                } catch (err) {
                    statusTxt.innerHTML = `<span style="color:red;">❌ Verification Failed: ${err.message}</span>`;
                }
                return;
            }

            // SCENARIO 2: We zitten BINNEN in de MetaMask of Trust in-app browser
            if (window.ethereum) {
                document.getElementById('mm-btn').style.display = 'none';
                document.getElementById('tw-btn').style.display = 'none';
                document.getElementById('ph-btn').style.display = 'none';
                
                instructionTxt.innerHTML = "In-App Browser detected.<br>Click below to sign the verification message.";
                const nativeBtn = document.getElementById('native-btn');
                nativeBtn.style.display = 'block';
                nativeBtn.onclick = connectEVMWallet;
                return;
            }

            // SCENARIO 3: Normale weergave (Knoppen naar de apps sturen)
            const cleanUrl = window.location.href.replace(/^https?:\/\//, '');
            const encodedUrl = encodeURIComponent(window.location.href);

            document.getElementById('mm-btn').onclick = () => window.location.href = `https://metamask.app.link/dapp/${cleanUrl}`;
            document.getElementById('tw-btn').onclick = () => window.location.href = `https://link.trustwallet.com/open_url?coin_id=60&url=${encodedUrl}`;
            document.getElementById('ph-btn').onclick = connectPhantom;
        };

        // --- EVM FUNCTIE (Voor MetaMask/Trust In-App Browser) ---
        async function connectEVMWallet() {
            try {
                statusTxt.innerText = "Connecting...";
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (!accounts || accounts.length === 0) throw new Error("No accounts found.");
                
                const address = accounts[0];
                statusTxt.innerText = "Please SIGN the message...";
                
                const messageHex = stringToHex("Verify wallet for Omni Bot Governance");
                await window.ethereum.request({
                    method: 'personal_sign',
                    params: [messageHex, address],
                });

                // Laat de fysieke Return knop zien na goedkeuren!
                showReturnButton(address);
            } catch (err) {
                statusTxt.innerHTML = `<span style="color:red;">❌ Cancelled or error.</span>`;
            }
        }

        // --- PHANTOM FUNCTIE (De exact werkende truc van eerder) ---
        function connectPhantom() {
            statusTxt.innerText = "Opening Phantom...";
            
            const keypair = nacl.box.keyPair();
            const secretKeyB58 = encodeBase58(keypair.secretKey);
            const publicKeyB58 = encodeBase58(keypair.publicKey);

            const appUrl = encodeURIComponent("https://noone3592.github.io");
            const redirectLink = encodeURIComponent(MY_URL + "?sk=" + secretKeyB58);

            const deepLink = `https://phantom.app/ul/v1/connect?app_url=${appUrl}&dapp_encryption_public_key=${publicKeyB58}&redirect_link=${redirectLink}`;
            
            window.location.href = deepLink;
        }
    </script>
</body>
</html>
