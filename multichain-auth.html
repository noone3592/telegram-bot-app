<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Omni Bot - Multichain Auth</title>

    <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.min.js"></script>
    <script>
        window.global = window;
        window.process = { env: { NODE_ENV: "production" } };
        try { window.Buffer = window.Buffer || window.buffer.Buffer; } catch(e) {}
    </script>

    <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.14.0/dist/index.umd.js" 
            onerror="document.getElementById('error-log').style.display='block'; document.getElementById('error-log').innerHTML+='❌ Fatal Error: Script blocked by browser or adblocker.<br>';"></script>

    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; margin: 0; }
        .container { max-width: 90%; margin: 0 auto; background: #1e1e1e; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { color: #ab9ff2; margin-top: 0; }
        .btn { background: #ab9ff2; color: #000; font-size: 18px; font-weight: bold; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 15px; display: none; }
        .btn-alt { background: #ffaa00; color: #000; } 
        .btn:active { transform: scale(0.96); }
        p { color: #ccc; font-size: 15px; line-height: 1.5; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; color: #aaa; }
        #error-log { margin-top: 20px; font-family: monospace; font-size: 12px; color: #ff5555; text-align: left; background: #2a0000; padding: 10px; border-radius: 8px; display: none; overflow-wrap: break-word;}
    </style>

    <script>
        const isTelegramWebView = (window.TelegramWebview || navigator.userAgent.includes("Telegram"));
        const isAndroid = /android/i.test(navigator.userAgent);
        
        if (isTelegramWebView && isAndroid) {
            const url = window.location.href;
            window.location.replace(`intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;end`);
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Governance Auth</h2>
        <p id="instruction">Loading tools...</p>
        
        <button id="browser-btn" class="btn btn-alt">🦊 Browser Wallet</button>
        <button id="wc-btn" class="btn">🌍 WalletConnect</button>
        
        <p id="status"></p>
        <div id="error-log"></div>
    </div>

    <script>
        const BOT_URL = "https://t.me/Omni_V1_Bot";
        const projectId = 'f5f53aec4c83975405848c390e58eb60';

        const statusTxt = document.getElementById('status');
        const instructionTxt = document.getElementById('instruction');
        const wcBtn = document.getElementById('wc-btn');
        const browserBtn = document.getElementById('browser-btn');
        const errorLog = document.getElementById('error-log');

        function showError(msg) {
            errorLog.style.display = 'block';
            errorLog.innerHTML += `❌ ${msg}<br>`;
            statusTxt.innerText = "Connection failed.";
        }
        
        window.onerror = function(msg, url, line) {
            showError(`System: ${msg} (Line ${line})`);
            return true;
        };

        window.onload = () => {
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            if (isTelegramWebView && isIOS) {
                instructionTxt.innerHTML = "⚠️ <b>Telegram blocks secure connections.</b><br><br>Please tap the compass icon (🧭) in the bottom right corner to open Safari.";
                return;
            }

            instructionTxt.innerHTML = "Select a method below to safely connect your wallet.";

            if (window.ethereum) {
                browserBtn.style.display = 'block';
                browserBtn.onclick = connectBrowserWallet;
            }

            wcBtn.style.display = 'block';
            wcBtn.onclick = connectWalletConnect;
        };

        async function proceedWithAddress(address) {
            statusTxt.style.color = "#00ff00";
            statusTxt.innerText = `✅ Success! Redirecting...`;
            wcBtn.style.display = 'none';
            browserBtn.style.display = 'none';

            setTimeout(() => {
                window.location.href = BOT_URL + "?start=wallet_" + address;
            }, 1500);
        }

        async function connectBrowserWallet() {
            try {
                statusTxt.innerText = "Requesting browser wallet...";
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts && accounts.length > 0) proceedWithAddress(accounts[0]);
                else throw new Error("No accounts found.");
            } catch (err) {
                showError("Browser Wallet: " + err.message);
            }
        }

        async function connectWalletConnect() {
            try {
                statusTxt.innerText = "Scanning for WalletConnect...";
                
                // DE BRUTE-FORCE RADAR: Zoek het hele systeem af naar de EthereumProvider
                let ProviderClass = null;
                for (const key in window) {
                    try {
                        // Is het direct de provider?
                        if (window[key] && typeof window[key].init === 'function' && key.toLowerCase().includes('ethereumprovider')) {
                            ProviderClass = window[key]; break;
                        }
                        // Zit het verstopt in een sub-object?
                        if (window[key] && window[key].EthereumProvider && typeof window[key].EthereumProvider.init === 'function') {
                            ProviderClass = window[key].EthereumProvider; break;
                        }
                    } catch(e) {}
                }

                if (!ProviderClass) {
                    throw new Error("Could not find Provider in memory. Ensure domains are whitelisted and reload.");
                }

                statusTxt.innerText = "Initializing WalletConnect...";

                const provider = await ProviderClass.init({
                    projectId: projectId,
                    chains: [1], 
                    showQrModal: true,
                    qrModalOptions: { themeMode: "dark" }
                });

                statusTxt.innerText = "Opening WalletConnect Popup...";
                await provider.enable();
                
                if (provider.accounts && provider.accounts.length > 0) {
                    proceedWithAddress(provider.accounts[0]);
                } else {
                    throw new Error("No accounts returned from WalletConnect.");
                }

            } catch (err) {
                showError("WalletConnect: " + err.message);
            }
        }
    </script>
</body>
</html>
